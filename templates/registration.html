<!DOCTYPE html>
<html >
<head>    
<title>registration</title>
</head>
<body>
    <input id="u" placeholder="username">
    <input id="p" placeholder="password">
    <button onclick="r()">registration</button>

        function r(){

            alert("registered");
        }

</body>
</html>
